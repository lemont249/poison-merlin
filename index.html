<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>毒药与梅林</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">

  <!-- ====== 首页 ====== -->
  <div id="screen-home" class="screen active">
    <div class="home-container">
      <h1 class="game-title">🧪 毒药与梅林</h1>
      <p class="game-subtitle">四人身份推理 · 联机版</p>
      <div class="name-input">
        <label>你的昵称</label>
        <input type="text" id="input-player-name" placeholder="输入昵称" maxlength="8">
      </div>
      <div class="home-buttons">
        <button id="btn-create" class="btn btn-primary">🏠 创建房间</button>
        <button id="btn-join" class="btn btn-outline">🚪 加入房间</button>
      </div>
      <div id="join-section" class="join-form">
        <input type="text" id="input-room-code" placeholder="输入4位房间号" maxlength="4" inputmode="numeric" pattern="[0-9]*">
        <button id="btn-join-submit" class="btn btn-primary btn-sm">加入</button>
        <button id="btn-join-cancel" class="btn btn-ghost btn-sm">取消</button>
      </div>
    </div>
  </div>

  <!-- ====== 房间大厅 ====== -->
  <div id="screen-lobby" class="screen">
    <h2>🏠 房间大厅</h2>
    <div class="room-code-display">
      <span class="label">房间号</span>
      <span id="lobby-room-code" class="code">----</span>
    </div>
    <p class="lobby-hint">等待玩家加入（4人）…</p>
    <ul id="lobby-player-list" class="player-list"></ul>
    <div class="lobby-actions">
      <button id="btn-start-game" class="btn btn-primary" disabled>🎮 开始游戏（需4人）</button>
      <p id="lobby-start-hint" class="hint-text">仅房主可开始</p>
    </div>
  </div>

  <!-- ====== 身份揭示 ====== -->
  <div id="screen-role-reveal" class="screen">
    <h2>🎭 你的身份</h2>
    <div id="role-card" class="role-card">
      <div class="role-icon" id="role-icon">❓</div>
      <h3 id="role-name">---</h3>
      <p id="role-side" class="role-side">---</p>
      <p id="role-desc" class="role-desc">---</p>
    </div>
    <div id="role-extra-info" class="info-box hidden"></div>
    <button id="btn-confirm-role" class="btn btn-primary">✅ 确认身份，进入夜晚</button>
  </div>

  <!-- ====== 夜晚等待 ====== -->
  <div id="screen-night-waiting" class="screen">
    <h2>🌙 夜晚阶段</h2>
    <div class="round-badge">第 <span id="round-num-waiting">1</span> / 5 轮</div>
    <div class="waiting-animation">
      <div class="moon-icon">🌙</div>
      <p id="waiting-reason" class="waiting-text">等待其他玩家行动…</p>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ====== 夜晚行动 ====== -->
  <div id="screen-night-action" class="screen">
    <h2>🌙 夜晚阶段</h2>
    <div class="round-badge">第 <span id="round-num-action">1</span> / 5 轮</div>
    <h3 id="action-title">选择目标</h3>
    <p id="action-desc" class="night-desc"></p>
    <p id="action-hint" class="night-hint"></p>
    <div id="action-targets" class="target-list"></div>
    <button id="btn-action-skip" class="btn btn-ghost">⏭️ 跳过</button>
  </div>

  <!-- ====== 夜晚信息 ====== -->
  <div id="screen-night-info" class="screen">
    <h2>🌙 夜晚信息</h2>
    <div class="round-badge">第 <span id="round-num-info">1</span> / 5 轮</div>
    <div id="night-info-content" class="info-content"></div>
    <button id="btn-confirm-info" class="btn btn-primary">✅ 确认，进入下一轮</button>
  </div>

  <!-- ====== 游戏结束 ====== -->
  <div id="screen-game-over" class="screen">
    <h2 id="game-over-title">🏆 游戏结束</h2>
    <div id="game-over-icon" class="game-over-icon">🎉</div>
    <p id="game-over-reason"></p>
    <p id="game-over-detail"></p>
    <button id="btn-new-game" class="btn btn-primary">🔄 再来一局</button>
  </div>

  <div id="toast" class="toast hidden"></div>
</div>

<script src="app.js"></script>
</body>
</html>
